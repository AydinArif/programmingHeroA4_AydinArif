<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Job Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Job Application Tracker</h1>
            <p class="text-slate-500 mt-2">We help you track your job applications.</p>
        </header>
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-10">
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Total Apps</span>
                <div id="stat-total" class="text-3xl font-black text-indigo-600 mt-1">0</div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Interviews</span>
                <div id="stat-interviews" class="text-3xl font-black text-emerald-500 mt-1">0</div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Rejections</span>
                <div id="stat-rejections" class="text-3xl font-black text-rose-500 mt-1">0</div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
            <div class="flex bg-slate-200/50 p-1 rounded-lg" id="tab-container">
                <button class="filter-btn px-5 py-1.5 rounded-md text-sm font-semibold transition-all bg-white text-slate-800 shadow-sm">All</button>
                <button class="filter-btn px-5 py-1.5 rounded-md text-sm font-semibold text-slate-600 hover:text-slate-900">Interviews</button>
                <button class="filter-btn px-5 py-1.5 rounded-md text-sm font-semibold text-slate-600 hover:text-slate-900">Rejected</button>
            </div>
            <div class="text-sm font-medium text-slate-400 italic" id="job-qty">Showing 0 jobs</div>
        </div>

        <div id="main-feed" class="space-y-5"></div>
    </div>
</body>
</html>
